services:
  - type: web
    name: Quant
    env: go
    buildCommand: go build -o server ./cmd/server
    startCommand: ./server
    envVars:
      - key: PORT
        value: 8080
      - key: WALLETS_CONFIG
        value: wallets.config
      - key: STORE_PATH
        value: copied_trades.json
      - key: COPY_AMOUNT_USD
        value: "10"
      - key: SCAN_INTERVAL_MIN
        value: "5"
